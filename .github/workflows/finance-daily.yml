name: Generate Finance Daily

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Shanghai = 01:00 UTC
    - cron: "0 1 * * *"

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily report
        run: |
          python scripts/generate_daily.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily content index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update finance daily $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Create GitHub issue on failure
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Alert] Finance Daily workflow failed - ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `自动化日报任务执行失败。`,
              ``,
              `- Run URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Trigger: ${context.eventName}`,
              `- Ref: ${context.ref}`,
              `- Actor: ${context.actor}`,
              ``,
              `请检查 Actions 日志并重试。`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automation', 'alert']
            });
